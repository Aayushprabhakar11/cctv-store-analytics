services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./clips:/app/clips:ro
    environment:
      STORE_INTEL_DATABASE_URL: sqlite+aiosqlite:///./data/store_intel.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build: .
    command: python -m dashboard.live
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8000
      STORE_ID: STORE_BLR_002
    profiles:
      - dashboard
